<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Chat bubble -->
  <path d="M25 25 L75 25 L75 60 L60 60 L55 70 L50 60 L40 60 L25 60 Z" fill="white" opacity="0.95"/>
  
  <!-- AI sparkles -->
  <circle cx="35" cy="38" r="4" fill="url(#chatGrad)"/>
  <circle cx="65" cy="38" r="4" fill="url(#chatGrad)"/>
  
  <!-- Project initials: UXKD -->
  <text x="50" y="58" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle">UXKD</text>
  
  <!-- Small sparkles around -->
  <circle cx="20" cy="20" r="2" fill="#22d3ee" opacity="0.8"/>
  <circle cx="80" cy="20" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="20" cy="75" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="80" cy="75" r="2" fill="#22d3ee" opacity="0.8"/>
</svg>